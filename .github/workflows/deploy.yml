name: deploy

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deploy variables
        run: |
          echo "IMAGE_NAME=telegram-sender-api" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "DEPLOY_ENV_FILE=/opt/telegram-sender-api/.env" >> "$GITHUB_ENV"
          echo "APP_BIND_IP=${{ vars.APP_BIND_IP }}" >> "$GITHUB_ENV"

      - name: Verify deploy variables
        run: make verify-deploy-env

      - name: Verify Docker
        run: make verify-docker

      - name: Quality gate
        run: make check

      - name: Deploy
        run: make deploy-release
